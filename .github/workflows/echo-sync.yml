name: Nightly ECHO Data Sync

on:
  schedule:
    # Run at 5:00 AM UTC (1:00 AM EST) daily
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Run ECHO sync (facilities + pollutants)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        timeout-minutes: 15
        run: python sync/echo_sync.py

      - name: Update last-sync timestamp
        run: |
          echo "Sync completed at $(date -u)" >> sync/sync.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sync/sync.log
          git diff --cached --quiet || git commit -m "Data sync: $(date -u +%Y-%m-%d)"
          git push
